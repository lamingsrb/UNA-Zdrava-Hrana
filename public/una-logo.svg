  <!-- Simple apple - clean circle -->
  <circle cx="100" cy="90" r="35" fill="#EF4444"/>
  <circle cx="108" cy="80" rx="15" ry="18" fill="#FCA5A5" opacity="0.4"/>
  
  <!-- Modern leaf - simple curve -->
  <path d="M100 55 Q95 45, 90 40" stroke="#10B981" stroke-width="3" stroke-linecap="round" fill="none"/>
